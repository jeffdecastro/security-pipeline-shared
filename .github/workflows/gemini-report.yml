name: Gemini Security Report (reusable)

# Called by downstream repos' security workflows. Downloads scanner-output
# artifacts already uploaded earlier in the SAME calling workflow run,
# normalizes them into one schema, and asks Gemini to turn that into a
# dev-readable, CWE-aware, risk-prioritized PR comment. Never fails the
# caller's build — every step after checkout is continue-on-error.

on:
  workflow_call:
    inputs:
      pr_number:
        required: true
        type: string
      artifact_manifest:
        description: >
          Comma-separated list of parser-key=artifact-name pairs, e.g.
          "semgrep-sarif=semgrep-output,trivy-sarif=trivy-output,nuclei-jsonl=nuclei-results"
        required: true
        type: string
      shared_ref:
        description: >
          Ref of security-pipeline-shared to check out. Defaults to main;
          callers wanting reproducible runs should pin a tag or commit SHA.
        required: false
        type: string
        default: main
    secrets:
      GEMINI_API_KEY:
        required: true

permissions: {}

# Two runs racing on the same PR would both read "no existing comment" and each
# POST one, defeating the upsert. Serialize per PR instead.
concurrency:
  group: gemini-report-${{ github.repository }}-${{ inputs.pr_number }}
  cancel-in-progress: false

jobs:
  gemini-report:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Validate inputs
        env:
          PR_NUMBER: ${{ inputs.pr_number }}
          MANIFEST: ${{ inputs.artifact_manifest }}
        run: |
          set -euo pipefail
          if ! [[ "$PR_NUMBER" =~ ^[0-9]+$ ]]; then
            echo "::error::pr_number must be numeric, got '$PR_NUMBER'"
            exit 1
          fi
          # Every manifest entry must be <key>=<artifact-name> using a
          # conservative charset. This input reaches `gh run download --name`,
          # so reject anything that could be read as a flag or a path.
          IFS=',' read -ra PAIRS <<< "$MANIFEST"
          for pair in "${PAIRS[@]}"; do
            if ! [[ "$pair" =~ ^[a-z0-9-]+=[A-Za-z0-9._-]+$ ]]; then
              echo "::error::invalid artifact_manifest entry: '$pair'"
              exit 1
            fi
          done
          echo "validated ${#PAIRS[@]} manifest entr(ies)"

      - name: Checkout shared scripts
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: jeffdecastro/security-pipeline-shared
          ref: ${{ inputs.shared_ref }}
          path: _shared
          persist-credentials: false

      - name: Download scanner artifacts and build parser args
        id: fetch
        continue-on-error: true
        env:
          MANIFEST: ${{ inputs.artifact_manifest }}
          RUN_ID: ${{ github.run_id }}
          REPO: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p _scanner_output
          # NUL-delimited so paths containing spaces/newlines/metacharacters
          # survive intact. Never interpolate these into a shell command line.
          : > parser_args.txt

          IFS=',' read -ra PAIRS <<< "$MANIFEST"
          for pair in "${PAIRS[@]}"; do
            key="${pair%%=*}"
            artifact="${pair#*=}"
            dest="_scanner_output/${artifact}"
            mkdir -p "$dest"

            if ! gh run download "$RUN_ID" --repo "$REPO" --name "$artifact" --dir "$dest"; then
              echo "::warning::artifact '$artifact' not available in run $RUN_ID; skipping"
              continue
            fi

            # Artifacts can bundle a human-readable report (.html) alongside the
            # machine-readable one (.json/.sarif/.jsonl) - always prefer the
            # latter, and feed every match rather than just the first.
            found=0
            while IFS= read -r -d '' file; do
              printf '%s=%s\0' "$key" "$file" >> parser_args.txt
              found=$((found + 1))
            done < <(find "$dest" -type f \( -name '*.json' -o -name '*.sarif' -o -name '*.jsonl' \) -print0 | sort -z)

            if [ "$found" -eq 0 ]; then
              echo "::warning::no machine-readable file found in artifact '$artifact'"
            else
              echo "queued $found file(s) from '$artifact' for parser '$key'"
            fi
          done

      - name: Set up Python
        uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c # v6.0.0
        with:
          python-version: '3.12'

      - name: Normalize findings
        continue-on-error: true
        run: |
          set -euo pipefail
          touch parser_args.txt
          python3 _shared/scripts/normalize.py --args-file parser_args.txt > normalized-findings.json
          echo "--- normalized findings (first 200 lines) ---"
          head -n 200 normalized-findings.json

      - name: Generate Gemini report and post PR comment
        continue-on-error: true
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ inputs.pr_number }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python3 _shared/scripts/gemini_report.py normalized-findings.json

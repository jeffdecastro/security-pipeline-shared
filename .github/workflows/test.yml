name: Tests

# The scripts in this repo run inside other repos' pipelines via workflow_call,
# so a regression here silently degrades every downstream caller. Run the unit
# suite on every push and PR.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  unittest:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        # 3.12 is what gemini-report.yml pins; 3.11 guards against accidentally
        # depending on a newer stdlib feature if a caller overrides the version.
        python-version: ['3.11', '3.12']
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c # v6.0.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run unit tests
        run: python3 -m unittest discover -s tests -v

      - name: Smoke-test the CLI end to end
        run: |
          set -euo pipefail
          cat > smoke.sarif <<'EOF'
          {"runs":[{"tool":{"driver":{"rules":[{"id":"r","properties":{"tags":["CWE-89: SQL Injection"],"security-severity":"9.1"}}]}},
          "results":[{"ruleId":"r","level":"error","message":{"text":"SQLi"},
          "locations":[{"physicalLocation":{"artifactLocation":{"uri":"a.java"},"region":{"startLine":7}}}]}]}]}
          EOF
          printf 'semgrep-sarif=%s\0' "$PWD/smoke.sarif" > args.txt
          python3 scripts/normalize.py --args-file args.txt > out.json
          cat out.json
          python3 - <<'PY'
          import json, sys
          f = json.load(open("out.json"))
          assert len(f) == 1, f
          assert f[0]["cwe"] == "CWE-89", f[0]
          assert f[0]["severity"] == "CRITICAL", f[0]
          assert f[0]["line"] == 7, f[0]
          print("smoke test OK")
          PY
